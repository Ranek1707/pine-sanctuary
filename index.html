<script>
$(document).ready(function() {
    $('#inject-btn').click(function() {
        // 【修正済】/e/を削除し、末尾をformResponseにする
        const FORM_URL = "https://docs.google.com/forms/d/1ZpN1yMUkTp-ay20UDYy090J6aPBCos4z2fGaLi3EkiM/formResponse";
        const ENTRY_ID = "entry.1046996962"; 

        const params = new URLSearchParams();
        let checkedCount = 0;

        // HTMLのid属性（M01-01など）を収集
        $('.task-check:checked').each(function() {
            params.append(ENTRY_ID, $(this).attr('id'));
            checkedCount++;
        });

        if (checkedCount === 0) {
            alert('ミッションを選択してくれ。');
            return;
        }

        // 送信プロトコル発動
        fetch(FORM_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: params.toString()
        })
        .then(() => {
            alert('【同期成功】検体を回収した。スプリントを継続せよ。');
            // --- 【追加】チェックボックスのリセット ---
            $('.task-check').prop('checked', false); 
        })
        .catch(e => {
            console.error(e);
            alert('通信エラーだ。');
        });
    });
});
</script>
